name: Get Network Policy

on:
  schedule:
    # 매일 09:00 UTC (한국시간 18:00) 실행
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  id-token: write   # GitHub OIDC 토큰 발급에 필요
  contents: read

jobs:
  run-network-policy:
    runs-on: ubuntu-latest
    env:
      # Workspace-level OIDC: Account IP ACL 우회
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ vars.DATABRICKS_WORKSPACE_URL }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_SP_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      # WIF 인증 확인
      - name: Verify Databricks authentication (WIF)
        run: databricks current-user me

      # 스크립트를 워크스페이스에 업로드
      - name: Upload script to workspace
        run: |
          databricks workspace import \
            /Shared/admin/get_network_policy \
            --file scripts/get_network_policy.py \
            --language PYTHON \
            --format SOURCE \
            --overwrite

      # Job 제출 및 완료 대기
      - name: Submit and wait for job
        run: |
          RUN_ID=$(databricks jobs submit --json '{
            "run_name": "get-network-policy",
            "tasks": [
              {
                "task_key": "get_network_policy",
                "notebook_task": {
                  "notebook_path": "/Shared/admin/get_network_policy",
                  "source": "WORKSPACE"
                },
                "new_cluster": {
                  "spark_version": "16.2.x-scala2.12",
                  "num_workers": 0,
                  "node_type_id": "Standard_DS3_v2",
                  "spark_conf": {
                    "spark.databricks.cluster.profile": "singleNode",
                    "spark.master": "local[*]"
                  },
                  "spark_env_vars": {
                    "DATABRICKS_ACCOUNT_ID": "{{secrets/admin/databricks-account-id}}",
                    "DATABRICKS_CLIENT_ID": "{{secrets/admin/sp-client-id}}",
                    "DATABRICKS_CLIENT_SECRET": "{{secrets/admin/sp-client-secret}}"
                  },
                  "custom_tags": {
                    "ResourceClass": "SingleNode"
                  }
                },
                "libraries": [
                  { "pypi": { "package": "requests" } }
                ]
              }
            ]
          }' | jq -r '.run_id')

          echo "Run ID: $RUN_ID"

          # 완료 대기 (최대 30분)
          databricks jobs get-run --run-id "$RUN_ID" --no-wait 2>/dev/null || true

          while true; do
            STATE_JSON=$(databricks jobs get-run --run-id "$RUN_ID" 2>&1)
            LIFE_CYCLE=$(echo "$STATE_JSON" | jq -r '.state.life_cycle_state')
            echo "Life cycle: $LIFE_CYCLE"
            if [ "$LIFE_CYCLE" = "TERMINATED" ] || [ "$LIFE_CYCLE" = "SKIPPED" ] || [ "$LIFE_CYCLE" = "INTERNAL_ERROR" ]; then
              break
            fi
            sleep 30
          done

          RESULT=$(echo "$STATE_JSON" | jq -r '.state.result_state')
          echo "Result: $RESULT"

          if [ "$RESULT" != "SUCCESS" ]; then
            echo "::error::Job 실행 실패 (state=$RESULT)"
            echo "$STATE_JSON" | jq '.state'
            # 실행 출력 확인
            databricks jobs get-run-output --run-id "$RUN_ID" 2>&1 | jq '.error, .error_trace' || true
            exit 1
          fi
